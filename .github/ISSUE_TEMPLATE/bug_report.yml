name: Bug report
description: Report a reproducible problem in GitPulse.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please include enough detail for maintainers to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the problem clearly and briefly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the problem.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Dashboard / UI
        - Authentication
        - GitHub API data
        - User settings
        - Browser extension
        - Build / deployment
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 126, Firefox 127, Safari 18, etc.

  - type: input
    id: runtime
    attributes:
      label: Runtime / deployment
      placeholder: Local Bun dev server, static export, Vercel, Docker, etc.

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant console output, server logs, screenshots, or network responses.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add any other context that may help with triage.
