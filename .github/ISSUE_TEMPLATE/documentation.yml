name: Documentation
description: Report missing, unclear, or outdated documentation.
title: '[Docs]: '
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Which page, section, file, or message needs work?
      placeholder: README.md, deployment docs, settings text, zh-cn translation, etc.
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
      description: Describe the unclear, missing, inaccurate, or outdated content.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: If you know what the docs should say, describe it here.

  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - English
        - Simplified Chinese
        - Both
        - Not language-specific
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add links, screenshots, or related issues.
