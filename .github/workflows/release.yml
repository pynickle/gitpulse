name: Release Extension

on:
  push:
    tags:
      - 'extension-v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install extension dependencies
        run: bun install --frozen-lockfile
        working-directory: extension

      - name: Extract and validate extension version
        id: version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#extension-v}"
          package_version="$(bun -e "console.log(require('./extension/package.json').version)")"

          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version ($tag_version) must match extension/package.json version ($package_version)." >&2
            exit 1
          fi

          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Zip extensions
        working-directory: extension
        run: |
          bun run zip
          bun run zip:firefox

      - name: Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "GitPulse Extension v${{ steps.version.outputs.version }}" \
            --generate-notes \
            extension/.output/gitpulse-extension-${{ steps.version.outputs.version }}-chrome.zip \
            extension/.output/gitpulse-extension-${{ steps.version.outputs.version }}-firefox.zip \
            extension/.output/gitpulse-extension-${{ steps.version.outputs.version }}-sources.zip

      - name: Submit to stores
        working-directory: extension
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: |
          bunx wxt submit \
            --firefox-zip .output/gitpulse-extension-${{ steps.version.outputs.version }}-firefox.zip \
            --firefox-sources-zip .output/gitpulse-extension-${{ steps.version.outputs.version }}-sources.zip \
            --edge-zip .output/gitpulse-extension-${{ steps.version.outputs.version }}-chrome.zip
